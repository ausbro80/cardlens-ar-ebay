<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CardLens Glasses Auto Scan</title>
  <style>
    :root { --cyan:#9ffcff; --violet:#b88cff; --gold:#ffe58a; --green:#96ffbd; --white:rgba(255,255,255,.96); --muted:rgba(255,255,255,.72); --glass:rgba(5,8,15,.72); --border:rgba(159,252,255,.45); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; width:100%; height:100%; overflow:hidden; background:#040407; color:var(--white); font-family:Inter,ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .stage { position:relative; width:min(100vw,600px); height:100vh; margin:0 auto; overflow:hidden; background:#06070a; }
    video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:contrast(1.05) saturate(1.04) brightness(.88); }
    canvas { display:none; }
    .shade { position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at 50% 48%,transparent 0 35%,rgba(0,0,0,.2) 62%,rgba(0,0,0,.54) 100%),linear-gradient(180deg,rgba(0,0,0,.36),transparent 27%,rgba(0,0,0,.42)); }
    .sun-mode .shade { background:radial-gradient(circle at 50% 48%,transparent 0 30%,rgba(0,0,0,.38) 66%,rgba(0,0,0,.72) 100%),linear-gradient(180deg,rgba(0,0,0,.58),rgba(0,0,0,.16) 48%,rgba(0,0,0,.64)); }
    .permission { position:absolute; inset:0; z-index:50; display:grid; place-items:center; padding:24px; background:rgba(0,0,0,.58); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
    .permission-card { width:min(92vw,420px); padding:24px; border-radius:28px; background:linear-gradient(135deg,rgba(25,42,76,.86),rgba(77,45,116,.76)); border:1px solid rgba(255,255,255,.18); box-shadow:0 22px 70px rgba(0,0,0,.45); text-align:center; }
    .permission-card h1 { margin:0 0 9px; font-size:28px; letter-spacing:-.045em; }
    .permission-card p { margin:0 0 18px; color:var(--muted); font-size:15px; line-height:1.42; font-weight:720; }
    button { border:0; cursor:pointer; font-family:inherit; font-weight:950; letter-spacing:-.03em; }
    .start { width:100%; height:56px; border-radius:18px; color:#09101b; background:rgba(255,255,255,.94); font-size:18px; }
    .top-status { position:absolute; z-index:10; top:max(14px,env(safe-area-inset-top)); left:20px; right:20px; display:flex; align-items:center; justify-content:space-between; font-size:12px; font-weight:900; color:rgba(255,255,255,.78); text-shadow:0 2px 12px rgba(0,0,0,.78); }
    .dots { display:flex; gap:7px; } .dots span { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.92); box-shadow:0 0 12px rgba(255,255,255,.7); }
    .reticle-wrap { position:absolute; left:50%; top:45%; z-index:5; width:min(58vw,320px); height:min(44vh,440px); transform:translate(-50%,-50%) perspective(900px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)); transform-style:preserve-3d; pointer-events:none; transition:transform 80ms linear; }
    .reticle { position:absolute; inset:0; border-radius:26px; border:2px solid rgba(159,252,255,.78); box-shadow:0 0 26px rgba(159,252,255,.46),inset 0 0 34px rgba(159,252,255,.08); background:rgba(159,252,255,.025); }
    .reticle:before,.reticle:after { content:""; position:absolute; width:46px; height:46px; border-color:rgba(255,255,255,.92); filter:drop-shadow(0 0 12px rgba(159,252,255,.8)); }
    .reticle:before { left:14px; top:14px; border-left:5px solid; border-top:5px solid; border-radius:17px 0 0 0; }
    .reticle:after { right:14px; bottom:14px; border-right:5px solid; border-bottom:5px solid; border-radius:0 0 17px 0; }
    .scan-line { position:absolute; left:8%; right:8%; top:16%; height:3px; border-radius:999px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); box-shadow:0 0 18px rgba(159,252,255,.95),0 0 42px rgba(159,252,255,.42); animation:scan 2s ease-in-out infinite; opacity:.9; }
    @keyframes scan { 0%,100% { transform:translateY(0); opacity:.45; } 50% { transform:translateY(300px); opacity:1; } }
    .reticle-label { position:absolute; left:50%; bottom:16px; transform:translateX(-50%); max-width:86%; padding:7px 13px; border-radius:999px; background:rgba(0,0,0,.62); border:1px solid rgba(255,255,255,.18); color:white; font-size:12px; font-weight:900; white-space:nowrap; text-shadow:0 1px 8px rgba(0,0,0,.8); }
    .mini-hud { position:absolute; z-index:12; left:50%; top:18%; transform:translateX(-50%); width:min(86vw,480px); min-height:82px; border-radius:22px; border:1px solid var(--border); background:var(--glass); backdrop-filter:blur(18px) saturate(1.4); -webkit-backdrop-filter:blur(18px) saturate(1.4); box-shadow:0 0 28px rgba(159,252,255,.22),0 18px 54px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.14); padding:14px 16px; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; opacity:.98; }
    .mini-hud.idle { opacity:.84; }
    .card-name { font-size:clamp(18px,4.8vw,29px); line-height:1.02; font-weight:980; letter-spacing:-.055em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 0 18px rgba(159,252,255,.22); }
    .card-meta { margin-top:5px; color:var(--muted); font-size:12px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .live-chip { min-width:72px; height:48px; border-radius:16px; display:grid; place-items:center; color:var(--gold); border:1px solid rgba(255,229,138,.46); background:rgba(255,229,138,.13); font-size:12px; line-height:1.03; text-align:center; font-weight:980; box-shadow:0 0 18px rgba(255,229,138,.14); }
    .price-strip { position:absolute; z-index:12; left:50%; bottom:max(34px,env(safe-area-inset-bottom)); transform:translateX(-50%); width:min(86vw,480px); display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
    .price { min-height:58px; padding:10px 9px; border-radius:18px; background:rgba(5,8,15,.72); border:1px solid rgba(255,255,255,.16); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); box-shadow:0 0 22px rgba(159,252,255,.12),inset 0 1px 0 rgba(255,255,255,.1); }
    .price span:first-child { display:block; color:rgba(255,255,255,.64); font-size:10px; letter-spacing:.06em; font-weight:900; text-transform:uppercase; margin-bottom:4px; }
    .price span:last-child { display:block; font-size:clamp(17px,4.7vw,25px); font-weight:990; letter-spacing:-.04em; color:white; }
    .price.good span:last-child { color:var(--green); }
    .toast { position:absolute; z-index:20; left:50%; top:32%; transform:translate(-50%,-50%) translateY(8px); min-width:230px; max-width:82%; padding:11px 16px; border-radius:999px; background:rgba(6,10,18,.76); border:1px solid rgba(159,252,255,.3); backdrop-filter:blur(14px); color:white; text-align:center; font-size:14px; font-weight:900; opacity:0; pointer-events:none; transition:.18s ease; box-shadow:0 0 26px rgba(159,252,255,.22); }
    .toast.show { opacity:1; transform:translate(-50%,-50%) translateY(0); }
    .tiny-controls { position:absolute; z-index:14; right:18px; bottom:max(108px,calc(env(safe-area-inset-bottom) + 84px)); display:grid; gap:10px; }
    .round { width:48px; height:48px; border-radius:50%; color:white; background:rgba(5,8,15,.72); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(16px); font-size:20px; box-shadow:0 0 20px rgba(159,252,255,.18); }
    .debug { position:absolute; z-index:11; left:14px; right:14px; bottom:max(103px,calc(env(safe-area-inset-bottom) + 78px)); padding:7px 11px; border-radius:14px; background:rgba(0,0,0,.34); border:1px solid rgba(255,255,255,.08); color:rgba(255,255,255,.62); font-size:10px; line-height:1.25; font-weight:720; text-align:center; backdrop-filter:blur(8px); }
    .hidden { display:none !important; }
    @media (max-height:720px) { .mini-hud { top:14%; } .reticle-wrap { top:42%; height:38vh; } .debug { display:none; } }
  </style>
</head>
<body>
  <main id="stage" class="stage">
    <video id="camera" autoplay muted playsinline></video>
    <canvas id="captureCanvas"></canvas>
    <div class="shade"></div>
    <div id="permission" class="permission"><div class="permission-card"><h1>CardLens Glasses</h1><p>Look at any English Pokémon card. Auto scan runs in the background and shows a small glasses-style HUD.</p><button id="startBtn" class="start" type="button">Start auto scan</button></div></div>
    <div class="top-status"><span id="clock">12:48 · AUTO SCAN</span><span class="dots"><span></span><span></span><span></span></span></div>
    <section id="hud" class="mini-hud idle" aria-live="polite"><div><div id="cardName" class="card-name">Looking for card...</div><div id="cardMeta" class="card-meta">Keep the card centered and steady</div></div><div id="liveChip" class="live-chip">AUTO<br>OCR</div></section>
    <section id="reticleWrap" class="reticle-wrap"><div class="reticle"><div class="scan-line"></div><div id="reticleLabel" class="reticle-label">Auto scanning</div></div></section>
    <section class="price-strip"><div class="price good"><span>Raw</span><span id="rawPrice">--</span></div><div class="price"><span>PSA 9</span><span id="psa9">Link</span></div><div class="price"><span>PSA 10</span><span id="psa10">Link</span></div></section>
    <div class="tiny-controls"><button id="sunBtn" class="round" type="button">☀️</button><button id="pauseBtn" class="round" type="button">⏸</button></div>
    <div id="debug" class="debug">Waiting for camera...</div><div id="toast" class="toast">Ready</div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const stage=document.getElementById('stage'),camera=document.getElementById('camera'),canvas=document.getElementById('captureCanvas'),permission=document.getElementById('permission'),startBtn=document.getElementById('startBtn'),cardName=document.getElementById('cardName'),cardMeta=document.getElementById('cardMeta'),rawPrice=document.getElementById('rawPrice'),psa9=document.getElementById('psa9'),psa10=document.getElementById('psa10'),liveChip=document.getElementById('liveChip'),hud=document.getElementById('hud'),reticleLabel=document.getElementById('reticleLabel'),reticleWrap=document.getElementById('reticleWrap'),debug=document.getElementById('debug'),toast=document.getElementById('toast'),clock=document.getElementById('clock'),sunBtn=document.getElementById('sunBtn'),pauseBtn=document.getElementById('pauseBtn');
    let running=false,scanning=false,paused=false,lastQuery='',lastScanAt=0,stableFrames=0,lastBrightness=0,autoTimer=null;
    function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove('show'),1800)}
    function updateClock(){const n=new Date();clock.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+' · AUTO SCAN'}
    function setIdle(m){hud.classList.add('idle');cardName.textContent=m||'Looking for card...';cardMeta.textContent='Keep the card centered and steady';liveChip.innerHTML='AUTO<br>OCR';rawPrice.textContent='--';psa9.textContent='Link';psa10.textContent='Link'}
    async function startCamera(){const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});camera.srcObject=s;await camera.play()}
    function cropFrame(){const ctx=canvas.getContext('2d',{willReadFrequently:true}),vw=camera.videoWidth||1280,vh=camera.videoHeight||720,cw=Math.floor(vw*.62),ch=Math.floor(vh*.64),sx=Math.floor((vw-cw)/2),sy=Math.floor((vh-ch)/2);canvas.width=720;canvas.height=900;ctx.drawImage(camera,sx,sy,cw,ch,0,0,canvas.width,canvas.height);const img=ctx.getImageData(0,0,canvas.width,canvas.height),d=img.data;let sum=0;for(let i=0;i<d.length;i+=4){const g=d[i]*.34+d[i+1]*.46+d[i+2]*.2;sum+=g;const b=g>132?255:Math.max(0,g-36);d[i]=b;d[i+1]=b;d[i+2]=b}lastBrightness=Math.round(sum/(d.length/4));ctx.putImageData(img,0,0);return canvas}
    function frameIsStable(){const b=lastBrightness,diff=Math.abs(b-(frameIsStable.prev||b));frameIsStable.prev=b;if(diff<8&&b>45)stableFrames+=1;else stableFrames=0;return stableFrames>=2}
    function normalizeText(t){return String(t||'').toLowerCase().replace(/[^a-z0-9\/\s]/g,' ').replace(/\s+/g,' ').trim()}
    function extractQuery(ocrText){const clean=normalizeText(ocrText);const number=clean.match(/\b\d{1,3}\s*\/\s*\d{1,3}\b/);const lines=String(ocrText||'').split(/\n|\r/).map(normalizeText).filter(Boolean);let best='';for(const line of lines.slice(0,8)){const words=line.split(' ').filter(w=>w.length>2&&!['pokemon','basic','stage','evolves','from','weakness','resistance','retreat','illus','damage','during','your','next','turn','card'].includes(w));if(words.length){best=words.slice(0,3).join(' ');break}}if(number&&best)return best+' '+number[0];if(best)return best;if(number)return number[0];return clean.split(' ').filter(w=>w.length>2).slice(0,4).join(' ')}
    function pickPrice(card){const p=card&&card.tcgplayer&&card.tcgplayer.prices;if(!p)return null;for(const v of Object.values(p)){if(v.market)return v.market;if(v.mid)return v.mid}return card.prices&&card.prices.rawMarket?card.prices.rawMarket:null}
    function ebayLink(card,grade){const setName=card.set&&card.set.name?card.set.name:'';return 'https://www.ebay.com/sch/i.html?_nkw='+encodeURIComponent((card.name||'')+' '+setName+' '+(card.number||'')+' '+grade+' pokemon card')}
    async function lookupCard(q){const r=await fetch('/api/card-search?q='+encodeURIComponent(q));if(!r.ok)throw new Error('card search failed');return r.json()}
    function renderCard(card){const price=pickPrice(card);hud.classList.remove('idle');cardName.textContent=card.name||'Card found';const setName=card.set&&card.set.name?card.set.name:'Unknown set';cardMeta.textContent=setName+' · '+(card.number||'--')+' · '+(card.rarity||'--');liveChip.innerHTML='LIVE<br>TCG';rawPrice.textContent=price?'$'+Math.round(price):'N/A';psa9.textContent='Open';psa10.textContent='Open';psa9.dataset.url=card.prices&&card.prices.psa9Link?card.prices.psa9Link:ebayLink(card,'PSA 9');psa10.dataset.url=card.prices&&card.prices.psa10Link?card.prices.psa10Link:ebayLink(card,'PSA 10');reticleLabel.textContent='Locked on card';showToast('Card found')}
    async function autoScan(){if(!running||paused||scanning||!camera.videoWidth)return;const now=Date.now();if(now-lastScanAt<2600)return;lastScanAt=now;scanning=true;try{const prepared=cropFrame();if(!frameIsStable()){debug.textContent='Hold steady · brightness '+lastBrightness;reticleLabel.textContent='Hold steady';scanning=false;return}reticleLabel.textContent='Reading card...';debug.textContent='OCR running · brightness '+lastBrightness;const result=await Tesseract.recognize(prepared,'eng');const text=result.data.text||'';const query=extractQuery(text);if(!query||query.length<3||query===lastQuery){debug.textContent='No new card text · '+(text.slice(0,80)||'no text');reticleLabel.textContent='Looking for name';scanning=false;return}lastQuery=query;debug.textContent='Searching: '+query;const data=await lookupCard(query);const card=data.card||(data.cards&&data.cards[0])||null;if(card)renderCard(card);else{setIdle('No card matched');debug.textContent='No match for: '+query}}catch(e){debug.textContent=e.message||'Auto scan failed';reticleLabel.textContent='Scanning again'}finally{scanning=false}}
    function bindMotion(){window.addEventListener('deviceorientation',e=>{const beta=typeof e.beta==='number'?e.beta:55,gamma=typeof e.gamma==='number'?e.gamma:0,rx=Math.max(-7,Math.min(7,(beta-55)/8)),ry=Math.max(-7,Math.min(7,-gamma/8));reticleWrap.style.setProperty('--rx',rx+'deg');reticleWrap.style.setProperty('--ry',ry+'deg')})}
    async function requestMotionPermission(){if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){try{await DeviceOrientationEvent.requestPermission()}catch(_){}}bindMotion()}
    startBtn.addEventListener('click',async()=>{try{await requestMotionPermission();await startCamera();permission.classList.add('hidden');running=true;setIdle('Looking for card...');showToast('Auto scan started');autoTimer=setInterval(autoScan,600)}catch(e){showToast('Camera permission blocked');debug.textContent=e.message||'camera failed'}});
    sunBtn.addEventListener('click',()=>{stage.classList.toggle('sun-mode');showToast(stage.classList.contains('sun-mode')?'Outdoor visibility on':'Outdoor visibility off')});
    pauseBtn.addEventListener('click',()=>{paused=!paused;pauseBtn.textContent=paused?'▶':'⏸';showToast(paused?'Auto scan paused':'Auto scan resumed')});
    psa9.addEventListener('click',()=>{if(psa9.dataset.url)window.open(psa9.dataset.url,'_blank')});psa10.addEventListener('click',()=>{if(psa10.dataset.url)window.open(psa10.dataset.url,'_blank')});
    updateClock();setInterval(updateClock,30000);
  </script>
</body>
</html>
